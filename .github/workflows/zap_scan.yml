# este archivo YAML define el workflow de GitHub Actions para ejecutar un escaneo de seguridad utilizando OWASP ZAP. El workflow se activa cada vez que se realiza un push al repositorio. El proceso incluye la instalación de OWASP ZAP, la ejecución del escaneo definido en zap_scan.yaml, y la subida del reporte generado como un artefacto para su revisión posterior.
name: ZAP Juice Shop Scan

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u PPSvjp --password-stdin

      - name: Start Juice Shop
        run: |
          docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop
          timeout 120 bash -c 'while ! curl -f http://localhost:3000; do sleep 5; done'

      - name: ZAP Automation Framework (TU zap_scan.yaml)
        run: |
          docker run -it --rm \
            -v $(pwd):/zap/wrk/:rw \
            --network host \
#            -u 0 \
            ghcr.io/zaproxy/zap-automation:latest \
            /zap/zap-automation.py -f /zap/wrk/zap_scan.yaml

      - name: Debug Reports
        run: |
          echo "=== REPORTS GENERADOS ==="
          ls -la zap*.html report*.html || echo "No HTML"
          find . -name "*.html" -o -name "*.json"



#      - name: ZAP Baseline Scan
#        uses: zaproxy/action-baseline@v0.7.0
#        with:
#          target: 'http://localhost:3000'
#          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'  # ✅ EXISTE
#          # Quita failure_threshold (no válido en v0.7.0)

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-juice-shop-report
          path: |
            zap-baseline.html
            report_html.html
