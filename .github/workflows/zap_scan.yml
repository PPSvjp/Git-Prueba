# este archivo YAML define el workflow de GitHub Actions para ejecutar un escaneo de seguridad utilizando OWASP ZAP. El workflow se activa cada vez que se realiza un push al repositorio. El proceso incluye la instalación de OWASP ZAP, la ejecución del escaneo definido en zap_scan.yaml, y la subida del reporte generado como un artefacto para su revisión posterior.
name: ZAP Baseline Juice Shop

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login (para GHCR/DH)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io  # Y Docker Hub por default

      - name: Start Juice Shop
        run: |
          docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop
          timeout 120 bash -c 'while ! curl -f http://localhost:3000; do sleep 5; done'

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: 'zap_scan.yaml'  # Tu spider + active + report
          docker_name: 'ghcr.io/zaproxy/zap-stable'
          failure_threshold: medium  # Falla si medium+ risks
          report_title: 'Juice Shop ZAP Report'
          report_file: 'zap_report.html'
          cmd_options: '-a -z'  # Acepta riesgos por demo

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-juice-shop-report
          path: zap_report.*
