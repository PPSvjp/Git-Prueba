# Este archivo YAML define un proceso de escaneo utilizando OWASP ZAP para una aplicación web local en el puerto 3000. El proceso consta de tres trabajos: un spider para descubrir enlaces, un escaneo activo para identificar vulnerabilidades, y la generación de un informe en formato HTML.
# Lo colocamos en la raíz del proyecto para que pueda ser referenciado por el workflow de GitHub Actions definido en zap_scan.yml.

jobs:
  - type: spider
    parameters:
      url: "http://localhost:3000"
      maxDuration: 2
  - type: activeScan
    parameters:
      url: "http://localhost:3000"
      recurse: true
      maxDuration: 5
  - type: report
    parameters:
      template: traditional-html
      reportFile: zap_report.html
      reportTitle: "ZAP Scan Report"
