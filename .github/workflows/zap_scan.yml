# este archivo YAML define el workflow de GitHub Actions para ejecutar un escaneo de seguridad utilizando OWASP ZAP. El workflow se activa cada vez que se realiza un push al repositorio. El proceso incluye la instalación de OWASP ZAP, la ejecución del escaneo definido en zap_scan.yaml, y la subida del reporte generado como un artefacto para su revisión posterior.
name: ZAP Juice Shop Scan

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Juice Shop
        run: |
          docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop
          timeout 120 bash -c 'while ! curl -f http://localhost:3000; do sleep 5; done'

      - name: ZAP Scan Manual (Docker Hub OK)
        uses: docker://owasp/zap2docker-stable:prerelease  # Tag que SÍ existe
        env:
          TARGET: 'http://localhost:3000'
        with:
          entrypoint: /zap/zap-baseline.py
          args: '-t ${{ env.TARGET }} -r zap-baseline.html --format json'

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-juice-shop-reports
          path: |
            zap-baseline.*
            zap_report.*
