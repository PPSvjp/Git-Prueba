name: ZAP Juice Shop Scan

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login (Docker Hub + GHCR)
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Juice Shop
        run: |
          docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop
          timeout 120 bash -c 'while ! curl -f http://localhost:3000; do sleep 5; done'

      - name: ZAP Baseline v9 (Imagen ACTUAL)
        uses: zaproxy/action-baseline@v9.0.0
        with:
          target: 'http://localhost:3000'

      - name: Debug
        run: ls -la *.html *.json

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-complete-report
          path: |
            zap-baseline.html
            report*.html

